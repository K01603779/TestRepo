name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-quality:
    name: Build, Test & Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: mvn -B -T 1C test-compile

      - name: Run tests
        run: xvfb-run mvn -B -T 1C test

      - name: Check formatting
        run: mvn -B spotless:check

      - name: Run SpotBugs
        run: mvn -B spotbugs:check

      - name: Upload quality reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            target/checkstyle-result.xml
            target/spotbugsXml.xml