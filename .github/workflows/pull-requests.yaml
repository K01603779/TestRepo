name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write   # required only to post/update the PR comment

env:
  COMMIT_TYPES: "feat|fix|docs|style|refactor|perf|test|build|ci|chore|security|deps|release|revert|add"

jobs:
  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check Conventional Commits format
        id: title-check
        continue-on-error: true
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Format:
          # type(optional-scope)!: description
          #
          # Examples:
          # feat(auth): add OAuth support
          # fix(api): fix timeout handling
          # deps(maven): update spring boot
          # security(auth): fix token validation

          pattern="^(${COMMIT_TYPES})(\([a-z0-9_-]+\))?!?: .+"

          if ! echo "$PR_TITLE" | grep -qE "$pattern"; then
            echo "::error::PR title does not follow Conventional Commits format: \"$PR_TITLE\""
            echo "Expected: <type>(optional-scope): <description>"
            echo "Example: fix(auth): correct token refresh bug"
            echo "Allowed types: ${COMMIT_TYPES//|/, }"
            exit 1
          fi

          echo "PR title follows Conventional Commits format."

      - name: Comment on PR
        if: steps.title-check.outcome == 'failure'
        uses: actions/github-script@v9
        env:
          COMMIT_TYPES_DISPLAY: "feat, fix, docs, style, refactor, perf, test, build, ci, chore, security, deps, release, revert, add"
        with:
          script: |
            const marker = '<!-- pr-title-lint -->';
            const title = context.payload.pull_request.title;
            const types = process.env.COMMIT_TYPES_DISPLAY;

            const body = [
              marker,
              '### ❌ PR title does not follow Conventional Commits format',
              '',
              `Current title: \`${title}\``,
              '',
              'Expected: `<type>(optional-scope): <description>`',
              '',
              'Examples:',
              '- `feat(auth): add OAuth support`',
              '- `fix(api): correct timeout handling`',
              '- `deps(maven): update dependencies`',
              '',
              `Allowed types: \`${types}\``,
              '',
              '_This comment updates automatically once the title is fixed - just edit the PR title, no need to push a commit._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Clear PR comment on success
        if: steps.title-check.outcome == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- pr-title-lint -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n### ✅ PR title follows Conventional Commits format`,
              });
            }

      - name: Fail if title check failed
        if: steps.title-check.outcome == 'failure'
        run: exit 1