name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-quality:
    name: Build, Test & Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Spotless
        uses: ./.github/actions/ci/spotless
        with:
          github-token: ${{ github.token }}

      - name: Compile
        run: mvn -B -T 1C test-compile

      - name: Tests
        uses: ./.github/actions/ci/tests
        with:
          github-token: ${{ github.token }}

      - name: Run SpotBugs
        id: spotbugs
        continue-on-error: true
        run: mvn -B spotbugs:check -Dspotbugs.sarifOutput=true

      - name: Rename SARIF for upload-sarif
        if: steps.spotbugs.outcome == 'failure'
        run: |
          if [ -f target/spotbugsSarif.json ]; then
            cp target/spotbugsSarif.json target/spotbugs.sarif
          fi

      - name: Publish SpotBugs annotations
        if: steps.spotbugs.outcome == 'failure'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: target/spotbugs.sarif
          category: spotbugs

      - name: Upload quality reports
        if: steps.spotbugs.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: quality-reports
          if-no-files-found: ignore
          path: |
            target/spotbugsXml.xml
            target/spotbugsSarif.json
          retention-days: 7

      - name: Fail if SpotBugs failed
        if: steps.spotbugs.outcome == 'failure'
        run: exit 1