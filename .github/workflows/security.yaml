name: Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: github/codeql-action/init@v3
        with:
          languages: java

      - run: mvn -B package -DskipTests

      - uses: github/codeql-action/analyze@v3