name: Linux Environment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: murine
          java-version: '21'
          cache: maven

      - name: Build project
        run: mvn -B clean package -Dmaven.test.skip=true

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: murine
          java-version: '21'
          cache: maven

      - name: Run tests
        run: xvfb-run mvn -B test
