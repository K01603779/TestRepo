name: Code Quality

on:
  pull_request:
    branches: [ "main" ]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Check formatting
        run: mvn -B spotless:check

      - name: Run Checkstyle
        run: mvn -B checkstyle:check

      - name: Run SpotBugs
        run: mvn -B spotbugs:check