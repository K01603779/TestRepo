name: Tests

inputs:
  github-token:
    description: GitHub token
    required: true

runs:
  using: composite

  steps:
    - name: Run tests
      id: test
      continue-on-error: true
      shell: bash
      run: |
        xvfb-run mvn -B -fae test

    - name: Parse test results
      id: test-results
      if: steps.test.outcome == 'failure'
      shell: bash
      run: |
        python3 - <<'PY'
        import glob, json, re, xml.etree.ElementTree as ET
        
        failures = []
        
        for xml_path in glob.glob('**/target/surefire-reports/*.xml', recursive=True):
            try:
                root = ET.parse(xml_path).getroot()
            except ET.ParseError:
                continue
            if root.tag != 'testsuite':
                continue
            for tc in root.findall('testcase'):
                bad = tc.find('failure')
                kind = 'failure'
                if bad is None:
                    bad = tc.find('error')
                    kind = 'error'
                if bad is None:
                    continue
        
                classname = tc.get('classname', '')
                name = tc.get('name', '')
                message = (bad.get('message') or '').strip().replace('\n', ' ')
        
                outer_class = classname.split('$')[0]
                base_name = name.split('[')[0]
                rel = outer_class.replace('.', '/') + '.java'
                matches = glob.glob(f'**/src/test/java/{rel}', recursive=True)
                file_path = matches[0] if matches else None
                line = None
                if file_path:
                    pattern = re.compile(r'\b' + re.escape(base_name) + r'\s*\(')
                    with open(file_path, encoding='utf-8', errors='ignore') as f:
                        for i, text_line in enumerate(f, start=1):
                            if pattern.search(text_line):
                                line = i
                                break
        
                failures.append({
                    'classname': classname, 'name': name, 'kind': kind,
                    'message': message, 'file': file_path, 'line': line,
                })
        
        for f in failures:
            msg = f"{f['classname']}.{f['name']} {f['kind']}: {f['message']}"[:500]
            if f['file'] and f['line']:
                print(f"::error file={f['file']},line={f['line']}::{msg}")
            elif f['file']:
                print(f"::error file={f['file']},line=1::{msg}")
            else:
                print(f"::error::{msg}")
        
        with open('test-failures.json', 'w') as out:
            json.dump(failures, out)
        PY

    - name: Upload test report
      if: steps.test.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        if-no-files-found: ignore
        path: |
          **/target/surefire-reports/*.xml
        retention-days: 7

    - name: Comment on PR for test failures
      if: steps.test.outcome == 'failure' && github.event_name == 'pull_request'
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          let failures = [];
          try {
            failures = JSON.parse(fs.readFileSync('test-failures.json', 'utf8'));
          } catch (e) {
            // parsing step didn't produce a file - fall back to an empty list
          }
          
          const marker = '<!-- test-results-check -->';
          const rows = failures.map(f => `- \`${f.classname}#${f.name}\` — ${f.message || '_no message_'}`);
          const body = [
            marker,
            '### ❌ Test failures',
            '',
            `${failures.length || 'Some'} test${failures.length === 1 ? '' : 's'} failed.`,
            '',
            rows.length ? rows.join('\n') : '_(see the test-report artifact for details)_',
          ].join('\n');
          
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));
          
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Clear test-failure PR comment on success
      if: steps.test.outcome == 'success' && github.event_name == 'pull_request'
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const marker = '<!-- test-results-check -->';
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: `${marker}\n### ✅ All tests passing`,
            });
          }

    - name: Fail if tests failed
      if: steps.test.outcome == 'failure'
      shell: bash
      run: exit 1